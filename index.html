<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>كشف حضور الفعاليات — مركز مبارك هلال المنصوري للقراءات القرآنية</title>
<style>
  :root{
    --gold:#94854f; --gold-d:#6e6234; --olive:#cfc49a; --olive-pale:#e9e3cb;
    --cream:#faf8f2; --ink:#2f2b20; --muted:#7c745c; --line:#e3dcc4;
    --bg:#f1eee6; --paper:#ffffff; --ok:#3f7d4f; --warn:#9a7b2e;
  }
  *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Tahoma,Arial,sans-serif}
  body{background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased}
  .wrap{max-width:1080px;margin:0 auto;padding:18px 14px 70px}
  header.top{background:linear-gradient(180deg,#fff,#fbf9f2);border:1px solid var(--line);
    border-radius:16px;padding:22px 24px 18px;box-shadow:0 12px 30px -20px rgba(110,98,52,.5);
    display:flex;flex-direction:column;align-items:center;gap:10px;text-align:center}
  .logo{width:100%;max-width:540px;height:auto;display:block}
  .sys-title{font-size:1.42rem;color:var(--gold-d);letter-spacing:.3px;
    padding-top:12px;margin-top:4px;border-top:1px solid var(--olive-pale);width:100%;max-width:540px}
  .clock{font-size:.84rem;color:var(--muted);line-height:1.7}
  .clock b{color:var(--gold-d)} .clock .sep{margin:0 8px;color:var(--olive)}
  h2.view-title{color:var(--gold-d);font-size:1.25rem;margin:22px 0 4px}
  .sub{color:var(--muted);font-size:.82rem;margin-bottom:14px}
  .panel{background:var(--paper);border:1px solid var(--line);border-radius:16px;padding:20px;margin-bottom:18px;
    box-shadow:0 10px 24px -22px rgba(110,98,52,.6)}
  .panel h4{color:var(--gold-d);font-size:1rem;margin-bottom:14px;padding-bottom:10px;border-bottom:2px solid var(--olive-pale)}
  .form{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;align-items:end}
  .fld{display:flex;flex-direction:column;gap:5px}
  .fld label{font-size:.78rem;color:var(--muted)}
  .fld input,.fld select{padding:10px 12px;border:1px solid var(--line);border-radius:10px;font-size:.9rem;background:#fff;color:var(--ink);outline:none;transition:.15s}
  .fld input:focus,.fld select:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(148,133,79,.12)}
  .btn{cursor:pointer;border:none;border-radius:10px;padding:11px 18px;font-size:.9rem;font-weight:600;transition:.15s}
  .btn-main{background:linear-gradient(160deg,var(--gold),var(--gold-d));color:#fff}
  .btn-main:hover{filter:brightness(1.06)}
  .btn-line{background:#fff;border:1px solid var(--line);color:var(--gold-d)}
  .btn-line:hover{background:var(--cream);border-color:var(--gold)}
  .search{width:100%;padding:10px 14px;border:1px solid var(--line);border-radius:10px;font-size:.9rem;outline:none;margin-bottom:14px}
  .search:focus{border-color:var(--gold)}
  .tbl-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:12px}
  table{width:100%;border-collapse:collapse;font-size:.86rem;min-width:680px}
  thead th{background:linear-gradient(180deg,#fbf9f2,#f3efe2);color:var(--gold-d);padding:11px 10px;text-align:right;border-bottom:2px solid var(--olive-pale);white-space:nowrap}
  tbody td{padding:10px;border-bottom:1px solid var(--line);text-align:right}
  tbody tr:hover{background:var(--cream)} tbody tr:last-child td{border-bottom:none}
  .del{cursor:pointer;color:var(--muted);background:none;border:1px solid var(--line);border-radius:8px;padding:4px 10px;font-size:.8rem;transition:.15s}
  .del:hover{color:#fff;background:var(--gold-d);border-color:var(--gold-d)}
  .empty{text-align:center;color:var(--muted);padding:26px;font-size:.88rem}
  .count-line{font-size:.82rem;color:var(--muted);margin-top:10px} .count-line b{color:var(--gold-d)}
  .bottom-actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:18px;
    padding-top:18px;border-top:1px solid var(--line)}
  .bottom-actions .btn{display:flex;align-items:center;gap:7px}
  .geo-pill{display:inline-block;padding:2px 9px;border-radius:14px;font-size:.74rem;font-weight:600;white-space:nowrap}
  .geo-pill.gin{background:#e7f0e8;color:var(--ok)} .geo-pill.gout{background:#f3eddb;color:var(--warn)} .geo-pill.gna{background:#efece2;color:var(--muted)}
  .toast{position:fixed;top:18px;left:50%;transform:translateX(-50%) translateY(-160%);background:#fff;border:1px solid var(--line);
    border-right:5px solid var(--warn);border-radius:12px;padding:14px 22px;box-shadow:0 14px 34px -14px rgba(110,98,52,.55);
    font-size:.9rem;color:var(--ink);max-width:92%;z-index:9999;transition:transform .35s ease;text-align:center;font-weight:600;line-height:1.8}
  .toast.show{transform:translateX(-50%) translateY(0)} .toast.ok{border-right-color:var(--ok)}
  footer.foot{text-align:center;color:var(--muted);font-size:.76rem;margin-top:30px;padding-top:16px;border-top:1px solid var(--line)}
  footer.foot b{color:var(--gold-d)}
  @media(max-width:560px){.sys-title{font-size:1.15rem}}
</style>
</head>

  NATS.forEach(n=>{const o=document.createElement('option');o.textContent=n;s.appendChild(o);});})();

function now(){const d=new Date();
  return {date:d.toLocaleDateString('ar-EG-u-nu-latn',{year:'numeric',month:'long',day:'numeric',weekday:'long'}),
          time:d.toLocaleTimeString('ar-EG-u-nu-latn',{hour:'2-digit',minute:'2-digit'})};}
function tick(){const n=now();hDate.textContent=n.date;hTime.textContent=n.time;}
tick();setInterval(tick,30000);
function todayKey(){return new Date().toDateString();}

const KEY='markaz_events_only';
let DATA=[];
const CENTER={lat:24.416445,lng:54.603167},RADIUS=100; /* موقع المركز مثبّت — مدينة محمد بن زايد، أبوظبي */
function save(){try{localStorage.setItem(KEY,JSON.stringify({data:DATA}));}catch(e){}}
function load(){try{const r=localStorage.getItem(KEY);if(r){const o=JSON.parse(r);if(Array.isArray(o.data))DATA=o.data;}}catch(e){}}

/* الإشعار + التحقق المكاني الصامت */
let _toastT=null;
function showToast(msg,type){const el=document.getElementById('toast');if(!el)return;
  el.className='toast '+(type||'');el.innerHTML=msg;void el.offsetWidth;el.classList.add('show');
  clearTimeout(_toastT);_toastT=setTimeout(()=>el.classList.remove('show'),6000);}
function getPos(){return new Promise((res,rej)=>{if(!navigator.geolocation)return rej('no-geo');
  navigator.geolocation.getCurrentPosition(p=>res(p),e=>rej(e),{enableHighAccuracy:true,timeout:10000,maximumAge:0});});}
function haversine(la1,lo1,la2,lo2){const R=6371000,t=x=>x*Math.PI/180;const dla=t(la2-la1),dlo=t(lo2-lo1);
  const a=Math.sin(dla/2)**2+Math.cos(t(la1))*Math.cos(t(la2))*Math.sin(dlo/2)**2;return 2*R*Math.asin(Math.sqrt(a));}
async function geoStamp(){let p=null;
  try{p=await getPos();}
  catch(e){showToast('⛔ <b>تنبيه:</b> التسجيل متاح فقط من داخل موقع المركز.<br>تعذّر التحقق من موقعك — فعّلي إذن الموقع ثم أعيدي المحاولة.');return null;}
  const lat=p.coords.latitude,lng=p.coords.longitude,co={lat:lat.toFixed(6),lng:lng.toFixed(6)};
  const d=Math.round(haversine(CENTER.lat,CENTER.lng,lat,lng));
  if(d<=RADIUS)return {label:'✓ داخل الموقع ('+d+'م)',lat:co.lat,lng:co.lng};
  showToast('⛔ <b>تنبيه:</b> التسجيل متاح فقط من داخل موقع المركز.<br>أنتِ خارج النطاق المحدّد — المسافة '+d+'م.');return null;}
function geoCell(v){if(!v||v==='—')return '<span class="geo-pill gna">—</span>';
  if(v.indexOf('✓')===0)return '<span class="geo-pill gin">'+v+'</span>';
  if(v.indexOf('⛔')===0)return '<span class="geo-pill gout">'+v+'</span>';
  return '<span class="geo-pill gna">'+v+'</span>';}

/* التسجيل */
/* Registration: Saves locally and automatically syncs to Google Sheets */
async function evtStamp(){
  const type=evt_type.value,title=evt_title.value.trim(),name=evt_name.value.trim(),empno=evt_empno.value.trim(),
    nat=evt_nat.value,job=evt_job.value.trim(),phone=evt_phone.value.trim(),gender=evt_gender.value;
    
  if(!type){alert('Please select event type.');return;}
  if(!title){alert('Please enter activity title.');return;}
  if(!name){alert('Please enter visitor name.');return;}
  
  const g=await geoStamp();if(!g)return;
  const n=now();
  
  // 1. Existing local browser cache storage
  DATA.push({type,title,name,empno,nat,job,phone,gender,geo:g.label,lat:g.lat,lng:g.lng,date:n.date,time:n.time,day:todayKey()});
  save();
  
  // Refresh the local UI table immediately
  renderEvt();
  showToast('✓ Saved locally! Syncing with cloud database...','ok');

  // 2. NEW: Send the exact same data to Google Sheets in the background
  const webAppUrl = "https://script.google.com/macros/s/AKfycbx-PkbFxZtA0yBsuYZaR0Ys4g4EprMb4qtWLPecFOENyqFicNjMNdrnYvPnT_azAPk9/exec";

  const formData = new URLSearchParams();
  formData.append('Event Type', type);
  formData.append('Activity Title', title);
  formData.append('Full Name', name);
  formData.append('Job Number', empno);
  formData.append('Nationality', nat);
  formData.append('Job Title', job);
  formData.append('Phone Number', phone);
  formData.append('Gender', gender);
  formData.append('Date', n.date);
  formData.append('Time', n.time);
  formData.append('Latitude', g.lat);
  formData.append('Longitude', g.lng);

  // Silent background delivery
  fetch(webAppUrl, {
    method: "POST",
    mode: "no-cors", // Essential to bypass Google's security redirect block
    headers: { "Content-Type": "application/x-www-form-urlencoded" },
    body: formData.toString()
  }).then(() => {
    showToast('✓ Data synced successfully to the live Google Sheet!','ok');
  }).catch((err) => {
    console.error("Sync error:", err);
    showToast('⚠️ Cloud sync failed! Local copy is safe.','warn');
  });

  // 3. Clear text fields for the next submission (Your original logic)
  evt_name.value='';
  evt_empno.value='';
  evt_job.value='';
  evt_phone.value='';
}
function delRow(i){if(confirm('حذف هذا السجل؟')){DATA.splice(i,1);save();renderEvt();}}

const HEAD=['النوع','عنوان النشاط','اسم الزائر','الرقم الوظيفي','الجنسية','المهنة','الهاتف','الجنس','التاريخ','الوقت','التحقق المكاني'];
const KEYS=['type','title','name','empno','nat','job','phone','gender','date','time','geo'];
function renderEvt(){
  const q=evt_search.value.trim();
  const rows=DATA.map((r,i)=>({r,i})).filter(({r})=>!q||['name','title','type','nat','job','empno'].some(f=>(r[f]||'').includes(q)));
  let h='<thead><tr>'+HEAD.map(x=>'<th>'+x+'</th>').join('')+'<th></th></tr></thead><tbody>';
  if(!rows.length)h+='<tr><td colspan="'+(HEAD.length+1)+'" class="empty">لا توجد سجلات</td></tr>';
  rows.forEach(({r,i})=>{h+='<tr>'+KEYS.map(k=>k==='geo'?('<td>'+geoCell(r.geo)+'</td>'):('<td>'+(r[k]||'—')+'</td>')).join('')
    +'<td><button class="del" onclick="delRow('+i+')">حذف</button></td></tr>';});
  h+='</tbody>';evt_tbl.innerHTML=h;evt_total.textContent=DATA.length;
}
function exportCSV(){
  if(!DATA.length){alert('لا توجد سجلات للتصدير.');return;}
  let csv='\uFEFF'+HEAD.join(',')+'\n';
  DATA.forEach(r=>{csv+=KEYS.map(k=>'"'+((r[k]||'').toString().replace(/"/g,'""'))+'"').join(',')+'\n';});
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'}),url=URL.createObjectURL(blob),a=document.createElement('a');
  a.href=url;a.download='كشف_حضور_الفعاليات.csv';a.click();URL.revokeObjectURL(url);
}
function docHead(n,ref){
  return '<div class="hdr"><div><h1>مركز مبارك هلال المنصوري للقراءات القرآنية</h1><h2>الهيئة العامة للشؤون الإسلامية والأوقاف والزكاة — دولة الإمارات العربية المتحدة</h2></div>'
   +'<div class="l">الرقم المرجعي: '+ref+'<br>التاريخ: '+n.date+'<br>الوقت: '+n.time+'</div></div>';
}
const PRINT_CSS='@page{size:A4 landscape;margin:12mm}*{font-family:Segoe UI,Tahoma,Arial,sans-serif;color:#2f2b20}body{margin:0}'
 +'.hdr{display:flex;justify-content:space-between;align-items:center;border-bottom:3px double #94854f;padding-bottom:10px;margin-bottom:6px}'
 +'.hdr h1{font-size:15px;color:#6e6234;margin:0}.hdr h2{font-size:11px;color:#7c745c;margin:3px 0 0;font-weight:normal}.hdr .l{text-align:left;font-size:10px;color:#7c745c}'
 +'.title{text-align:center;margin:12px 0 6px;color:#6e6234;font-size:17px;font-weight:bold}.meta{display:flex;justify-content:space-between;font-size:10px;color:#7c745c;margin-bottom:8px}'
 +'table{width:100%;border-collapse:collapse;font-size:10px;margin-bottom:14px}th{background:#f3efe2;color:#6e6234;border:1px solid #cfc49a;padding:5px;text-align:right}'
 +'td{border:1px solid #e3dcc4;padding:4px 5px;text-align:right}tr:nth-child(even) td{background:#fbf9f2}h3{color:#6e6234;font-size:13px;margin:14px 0 6px}'
 +'.sign{display:flex;justify-content:space-between;margin-top:30px;font-size:10px;text-align:center}.sign div{flex:1;margin:0 8px}.sign .ln{border-top:1px solid #94854f;margin-top:30px;padding-top:5px;color:#6e6234}'
 +'.foot{text-align:center;font-size:9px;color:#9a927a;margin-top:16px;border-top:1px solid #e3dcc4;padding-top:6px}';
function printSheet(){
  if(!DATA.length){alert('لا توجد سجلات للطباعة.');return;}
  const n=now(),ref='EVT-'+new Date().getFullYear()+'-'+String(DATA.length).padStart(3,'0');
  let rows='';DATA.forEach((r,idx)=>{rows+='<tr><td>'+(idx+1)+'</td>'+KEYS.map(k=>'<td>'+(r[k]||'—')+'</td>').join('')+'</tr>';});
  const w=window.open('','_blank');
  w.document.write('<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><title>كشف حضور الفعاليات</title><style>'+PRINT_CSS+'</style></head><body>'
   +docHead(n,ref)+'<div class="title">كشف حضور الفعاليات</div><div class="meta"><span>عدد السجلات: '+DATA.length+'</span><span>الكشف معتمد للاستخدام الإداري</span></div>'
   +'<table><thead><tr><th>م</th>'+HEAD.map(x=>'<th>'+x+'</th>').join('')+'</tr></thead><tbody>'+rows+'</tbody></table>'
   +'<div class="sign"><div><div class="ln">المُعِدّ</div></div><div><div class="ln">المُدقّق</div></div><div><div class="ln">المُعتمِد</div></div></div>'
   +'<div class="foot">مُقدّم من مركز مبارك هلال المنصوري للقراءات القرآنية — وثيقة رسمية صادرة من كشف حضور الفعاليات</div>'
   +'<scr'+'ipt>window.onload=function(){window.print();}</scr'+'ipt></body></html>');
  w.document.close();
}
function statReport(){
  if(!DATA.length){alert('لا توجد سجلات للتقرير.');return;}
  const tot=DATA.length,n=now(),ref='RPT-'+new Date().getFullYear()+'-'+String(tot).padStart(3,'0');
  const by=key=>{const m={};DATA.forEach(r=>{const v=r[key]||'—';m[v]=(m[v]||0)+1;});return m;};
  const tbl=(t,obj)=>{let s='<h3>'+t+'</h3><table><thead><tr><th>البند</th><th>العدد</th><th>النسبة</th></tr></thead><tbody>';
    Object.keys(obj).sort((a,b)=>obj[b]-obj[a]).forEach(k=>{s+='<tr><td>'+k+'</td><td>'+obj[k]+'</td><td>'+(obj[k]/tot*100).toFixed(1)+'%</td></tr>';});
    return s+'</tbody></table>';};
  const w=window.open('','_blank');
  w.document.write('<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><title>التقرير الإحصائي لحضور الفعاليات</title><style>'+PRINT_CSS+'</style></head><body>'
   +docHead(n,ref)+'<div class="title">التقرير الإحصائي لحضور الفعاليات</div>'
   +'<div class="meta"><span>إجمالي الحضور المسجّل: '+tot+'</span><span>تقرير معتمد للاستخدام الإداري</span></div>'
   +tbl('التوزيع حسب نوع الفعالية',by('type'))
   +tbl('التوزيع حسب عنوان النشاط',by('title'))
   +tbl('التوزيع حسب الجنسية',by('nat'))
   +tbl('التوزيع حسب الجنس',by('gender'))
   +'<div class="sign"><div><div class="ln">المُعِدّ</div></div><div><div class="ln">المُدقّق</div></div><div><div class="ln">المُعتمِد</div></div></div>'
   +'<div class="foot">مُقدّم من مركز مبارك هلال المنصوري للقراءات القرآنية — تقرير إحصائي صادر من كشف حضور الفعاليات</div>'
   +'<scr'+'ipt>window.onload=function(){window.print();}</scr'+'ipt></body></html>');
  w.document.close();
}
